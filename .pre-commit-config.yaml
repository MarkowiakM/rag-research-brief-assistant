repos:
  - repo: local
    hooks:
      - id: backend-format
        name: backend format
        entry: bash -c 'cd backend && uv run ruff format .'
        language: system
        pass_filenames: false
        files: ^backend/

      - id: backend-lint
        name: backend lint
        entry: bash -c 'cd backend && uv run ruff check .'
        language: system
        pass_filenames: false
        files: ^backend/

      - id: backend-typecheck
        name: backend typecheck
        entry: bash -c 'cd backend && uv run mypy'
        language: system
        pass_filenames: false
        files: ^backend/

      - id: frontend-format
        name: frontend format
        entry: bash -c 'cd frontend && npm run format'
        language: system
        pass_filenames: false
        files: ^frontend/

      - id: frontend-lint
        name: frontend lint
        entry: bash -c 'cd frontend && npm run lint'
        language: system
        pass_filenames: false
        files: ^frontend/

      - id: frontend-typecheck
        name: frontend typecheck
        entry: bash -c 'cd frontend && npm run typecheck'
        language: system
        pass_filenames: false
        files: ^frontend/
