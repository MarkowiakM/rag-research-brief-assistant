services:
  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
      - ./.env:/.env:ro
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - ./.env:/.env:ro
    depends_on:
      - backend

  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-briefly}
      POSTGRES_USER: ${POSTGRES_USER:-briefly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-briefly}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  backend_venv:
  frontend_node_modules:
  postgres_data:
